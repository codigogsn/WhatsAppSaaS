<!doctype html>
<html lang="es">
<head>
  <meta charset="utf-8" />
  <meta name="viewport" content="width=device-width,initial-scale=1" />
  <title>CODIGO — Login</title>
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700;800&display=swap" rel="stylesheet">
  <style>
    :root {
      --font: 'Inter', -apple-system, BlinkMacSystemFont, 'SF Pro Display', 'Segoe UI', sans-serif;
      --radius: 16px; --radius-sm: 10px; --transition: .2s ease;
      --bg: #F5F5F7; --surface: #FFFFFF; --card: #FFFFFF;
      --text: #1D1D1F; --text-secondary: #6E6E73; --muted: #8E8E93;
      --border: #E8E8ED;
      --accent: #007AFF; --accent-hover: #0062CC;
      --accent-glow: rgba(0,122,255,.08);
      --danger: #FF3B30;
      --input-bg: #F5F5F7;
      --logo-color: #1D1D1F;
    }
    [data-theme="dark"] {
      --bg: #000000; --surface: rgba(28,28,30,.78); --card: rgba(22,22,26,.74);
      --text: #FFFFFF; --text-secondary: rgba(255,255,255,.78); --muted: #98989D;
      --border: rgba(255,255,255,.10);
      --accent: #0A84FF; --accent-hover: #409CFF;
      --accent-glow: rgba(10,132,255,.18);
      --danger: #FF453A;
      --input-bg: rgba(44,44,46,.65);
      --logo-color: #F5F5F7;
    }
    * { box-sizing: border-box; margin: 0; }
    html { -webkit-font-smoothing: antialiased; -moz-osx-font-smoothing: grayscale; }
    body {
      font-family: var(--font); background: var(--bg); color: var(--text);
      margin: 0; padding: 0; min-height: 100vh;
      display: flex; align-items: center; justify-content: center;
      transition: background var(--transition), color var(--transition);
      position: relative; overflow: hidden;
    }

    /* ─── Subtle grid background ─── */
    body::before {
      content: ''; position: fixed; inset: 0; z-index: 0; pointer-events: none;
      background-image:
        linear-gradient(rgba(0,0,0,.06) 1px, transparent 1px),
        linear-gradient(90deg, rgba(0,0,0,.06) 1px, transparent 1px);
      background-size: 40px 40px;
      -webkit-mask-image: radial-gradient(ellipse 70% 60% at 50% 50%, black 30%, transparent 80%);
      mask-image: radial-gradient(ellipse 70% 60% at 50% 50%, black 30%, transparent 80%);
    }
    [data-theme="dark"] body::before {
      background-image:
        linear-gradient(rgba(255,255,255,.07) 1px, transparent 1px),
        linear-gradient(90deg, rgba(255,255,255,.07) 1px, transparent 1px);
    }
    /* Soft vignette overlay */
    body::after {
      content: ''; position: fixed; inset: 0; z-index: 0; pointer-events: none;
      background: radial-gradient(ellipse 80% 80% at 50% 50%, transparent 40%, var(--bg) 100%);
    }

    .login-container {
      width: 100%; max-width: 400px; padding: 20px;
      position: relative; z-index: 1;
    }

    .login-card {
      background: var(--card);
      border: 1px solid rgba(0,0,0,.08);
      border-radius: var(--radius);
      padding: 44px 38px 38px;
      position: relative;
      box-shadow:
        inset 0 0 0 1px rgba(255,255,255,.70),
        inset 0 0 0 2px rgba(0,0,0,.025),
        inset 0 2px 4px rgba(0,0,0,.04),
        inset 0 -1px 3px rgba(0,0,0,.025),
        0 1px 2px rgba(0,0,0,.05),
        0 8px 32px rgba(0,0,0,.08),
        0 0 0 .5px rgba(0,0,0,.07);
      transition: box-shadow .3s ease, border-color .3s ease;
    }
    .login-card::before {
      content: ''; position: absolute; inset: 0;
      border-radius: inherit; pointer-events: none; z-index: 1;
      background: transparent;
      box-shadow:
        inset 0 0 0 1px rgba(255,255,255,.80),
        inset 0 0 6px 1px rgba(0,0,0,.035);
    }

    .brand { text-align: center; margin-bottom: 36px; position: relative; z-index: 2; }
    .brand-logo { font-size: 22px; font-weight: 800; letter-spacing: 4px; color: var(--logo-color); }
    .brand-sub { font-size: 10.5px; color: var(--muted); letter-spacing: 1px; text-transform: uppercase; margin-top: 8px; font-weight: 500; }

    .form-group { margin-bottom: 20px; position: relative; z-index: 2; }
    .form-group label {
      display: block; font-size: 11.5px; font-weight: 600; color: var(--text-secondary);
      margin-bottom: 7px; letter-spacing: .4px; text-transform: uppercase;
    }
    .form-group input {
      width: 100%; padding: 11px 14px;
      border: 1px solid rgba(0,0,0,.08);
      border-radius: var(--radius-sm);
      font-size: 14px; font-family: var(--font);
      background: var(--input-bg); color: var(--text);
      transition: border .25s ease, box-shadow .25s ease, background .25s ease;
      outline: none;
      box-shadow:
        inset 0 0 0 1px rgba(0,0,0,.03),
        inset 0 2px 4px rgba(0,0,0,.05),
        inset 0 -1px 2px rgba(255,255,255,.60);
    }
    .form-group input:focus {
      border-color: var(--accent);
      box-shadow:
        0 0 0 3.5px var(--accent-glow),
        inset 0 0 0 1px rgba(0,0,0,.02),
        inset 0 2px 4px rgba(0,0,0,.04);
    }
    .form-group input::placeholder { color: var(--muted); opacity: .7; }

    .login-btn {
      width: 100%; padding: 12px 20px; margin-top: 4px;
      background: var(--accent); color: #fff; border: none;
      border-radius: var(--radius-sm);
      font-size: 14px; font-weight: 600; font-family: var(--font);
      cursor: pointer;
      transition: all .25s cubic-bezier(.4,0,.2,1);
      position: relative; z-index: 2;
      border: 1px solid rgba(0,80,200,.14);
      box-shadow:
        inset 0 0 0 1px rgba(255,255,255,.12),
        inset 0 0 0 2px rgba(0,0,0,.04),
        inset 0 2px 3px rgba(0,0,0,.08),
        inset 0 -1px 2px rgba(0,80,200,.06),
        0 2px 8px rgba(0,122,255,.18),
        0 0 0 .5px rgba(0,80,200,.10);
    }
    .login-btn:hover {
      background: var(--accent-hover);
      box-shadow:
        inset 0 0 0 1px rgba(255,255,255,.15),
        inset 0 0 0 2px rgba(0,0,0,.03),
        inset 0 2px 3px rgba(0,0,0,.06),
        0 6px 20px rgba(0,122,255,.22),
        0 0 0 .5px rgba(0,80,200,.12);
      transform: translateY(-1px);
    }
    .login-btn:active { transform: translateY(0) scale(.98); transition-duration: .1s; }
    .login-btn:disabled { opacity: .55; cursor: not-allowed; transform: none; box-shadow: none; }

    .error-msg {
      color: var(--danger); font-size: 13px; text-align: center;
      margin-top: 14px; min-height: 20px; position: relative; z-index: 2;
    }

    .theme-toggle {
      position: fixed; top: 18px; right: 18px;
      background: var(--surface); border: 1px solid var(--border);
      color: var(--muted); width: 36px; height: 36px; border-radius: 50%;
      display: flex; align-items: center; justify-content: center;
      cursor: pointer; font-size: 15px; padding: 0; line-height: 1;
      transition: all .25s ease;
      box-shadow:
        inset 0 0 0 1px rgba(255,255,255,.65),
        inset 0 0 0 2px rgba(0,0,0,.025),
        0 1px 3px rgba(0,0,0,.06);
      z-index: 10;
    }
    .theme-toggle:hover { color: var(--text); transform: scale(1.05); }
    .theme-toggle:active { transform: scale(.95); }

    .admin-fallback {
      text-align: center; margin-top: 24px; position: relative; z-index: 2;
    }
    .admin-fallback a {
      color: var(--muted); font-size: 12px; text-decoration: none;
      transition: color var(--transition);
    }
    .admin-fallback a:hover { color: var(--text-secondary); }

    /* Dark mode glass */
    [data-theme="dark"] .login-card {
      border: 1px solid rgba(255,255,255,.12);
      box-shadow:
        inset 0 0 0 1px rgba(255,255,255,.07),
        inset 0 0 0 2px rgba(0,0,0,.15),
        inset 0 2px 5px rgba(0,0,0,.22),
        inset 0 -1px 3px rgba(255,255,255,.04),
        0 1px 2px rgba(0,0,0,.28),
        0 12px 40px rgba(0,0,0,.45),
        0 0 0 .5px rgba(255,255,255,.07);
      -webkit-backdrop-filter: blur(24px) saturate(140%);
      backdrop-filter: blur(24px) saturate(140%);
    }
    [data-theme="dark"] .login-card::before {
      box-shadow:
        inset 0 0 0 1px rgba(255,255,255,.06),
        inset 0 0 8px 2px rgba(0,0,0,.12);
    }
    [data-theme="dark"] .form-group input {
      border: 1px solid rgba(255,255,255,.08);
      box-shadow:
        inset 0 0 0 1px rgba(0,0,0,.15),
        inset 0 2px 4px rgba(0,0,0,.22),
        inset 0 -1px 2px rgba(255,255,255,.03);
    }
    [data-theme="dark"] .form-group input:focus {
      border-color: var(--accent);
      box-shadow:
        0 0 0 3px var(--accent-glow),
        inset 0 0 0 1px rgba(0,0,0,.10),
        inset 0 2px 4px rgba(0,0,0,.14);
    }
    [data-theme="dark"] .login-btn {
      background: rgba(10,125,245,.82);
      border: 1px solid rgba(90,170,255,.22);
      box-shadow:
        inset 0 0 0 1px rgba(255,255,255,.08),
        inset 0 0 0 2px rgba(0,0,0,.10),
        inset 0 2px 4px rgba(0,0,0,.14),
        inset 0 -1px 2px rgba(80,160,255,.08),
        0 2px 8px rgba(10,132,255,.30),
        0 0 0 .5px rgba(90,170,255,.15);
    }
    [data-theme="dark"] .login-btn:hover {
      background: rgba(25,140,255,.86);
      border-color: rgba(100,180,255,.28);
      box-shadow:
        inset 0 0 0 1px rgba(255,255,255,.10),
        inset 0 0 0 2px rgba(0,0,0,.08),
        0 4px 16px rgba(10,132,255,.35),
        0 0 0 .5px rgba(100,180,255,.18);
    }
    [data-theme="dark"] .theme-toggle {
      background: rgba(48,48,52,.70);
      border: 1px solid rgba(255,255,255,.14);
      box-shadow:
        inset 0 0 0 1px rgba(255,255,255,.05),
        inset 0 0 0 2px rgba(0,0,0,.12),
        0 2px 6px rgba(0,0,0,.28);
    }

    /* Password toggle */
    .password-wrap { position: relative; }
    .password-wrap input { width: 100%; padding-right: 42px; }
    .eye-toggle {
      position: absolute; right: 4px; top: 50%; transform: translateY(-50%);
      background: none; border: none; box-shadow: none;
      cursor: pointer; padding: 6px 8px; font-size: 16px; line-height: 1;
      color: var(--muted); transition: color var(--transition);
      z-index: 3;
    }
    .eye-toggle:hover { color: var(--text-secondary); background: none; box-shadow: none; transform: translateY(-50%); }
    .eye-toggle:active { transform: translateY(-50%); background: none; box-shadow: none; }
    [data-theme="dark"] .eye-toggle { box-shadow: none; border: none; background: none; }
    [data-theme="dark"] .eye-toggle:hover { box-shadow: none; background: none; }
  </style>
</head>
<body>
  <button class="theme-toggle" onclick="toggleTheme()" title="Cambiar tema">
    <span id="themeIcon">&#9790;</span>
  </button>

  <div class="login-container">
    <div class="login-card">
      <div class="brand">
        <div class="brand-logo">CODIGO</div>
        <div class="brand-sub">WhatsApp Agent</div>
      </div>

      <form id="loginForm" onsubmit="handleLogin(event)">
        <div class="form-group">
          <label for="email">Email</label>
          <input type="email" id="email" placeholder="tu@email.com" autocomplete="email" required />
        </div>
        <div class="form-group">
          <label for="password">Password</label>
          <div class="password-wrap">
            <input type="password" id="password" placeholder="Password" autocomplete="current-password" required />
            <button type="button" class="eye-toggle" onclick="togglePasswordVisibility()" tabindex="-1" title="Mostrar/ocultar">
              <span id="eyeIcon">&#128065;</span>
            </button>
          </div>
        </div>
        <button type="submit" class="login-btn" id="loginBtn">Iniciar Sesion</button>
        <div class="error-msg" id="errorMsg"></div>
      </form>

      <div style="text-align:center;margin-top:20px;position:relative;z-index:2;">
        <div style="font-size:12px;color:var(--muted);margin-bottom:8px;">&#191;Eres parte del equipo?</div>
        <button type="button" onclick="handleStaffLogin()" id="staffBtn"
          style="background:none;border:1px solid var(--border);color:var(--text-secondary);
          padding:8px 20px;border-radius:var(--radius-sm);font-size:13px;font-weight:500;
          font-family:var(--font);cursor:pointer;transition:all .2s ease;">
          Entrar como Staff
        </button>
      </div>
    </div>
  </div>

<script>
// Theme
(function(){
  const saved = localStorage.getItem('THEME');
  if (saved) { applyTheme(saved); return; }
  const prefersDark = window.matchMedia('(prefers-color-scheme: dark)').matches;
  applyTheme(prefersDark ? 'dark' : 'light');
})();
function applyTheme(t){
  document.documentElement.setAttribute('data-theme', t);
  const icon = document.getElementById('themeIcon');
  if (icon) icon.textContent = t === 'dark' ? '\u2600' : '\u263E';
}
function toggleTheme(){
  const current = document.documentElement.getAttribute('data-theme') || 'light';
  const next = current === 'dark' ? 'light' : 'dark';
  localStorage.setItem('THEME', next);
  applyTheme(next);
}

// Password visibility toggle
function togglePasswordVisibility() {
  const pw = document.getElementById('password');
  const icon = document.getElementById('eyeIcon');
  if (pw.type === 'password') {
    pw.type = 'text';
    icon.textContent = '\u{1F648}'; // see-no-evil monkey (hidden)
  } else {
    pw.type = 'password';
    icon.textContent = '\u{1F441}'; // eye (visible)
  }
}

// Already logged in? Go to dashboard
if (localStorage.getItem('AUTH_TOKEN')) {
  window.location.href = '/';
}

function handleStaffLogin() {
  var email = document.getElementById('email').value.trim();
  var password = document.getElementById('password').value;
  if (!email || !password) {
    document.getElementById('errorMsg').textContent = 'Completa email y password';
    return;
  }
  doLogin('staff');
}

async function handleLogin(e) {
  e.preventDefault();
  doLogin('admin');
}

async function doLogin(mode) {
  var btn = document.getElementById('loginBtn');
  var staffBtn = document.getElementById('staffBtn');
  var errEl = document.getElementById('errorMsg');
  errEl.textContent = '';
  btn.disabled = true;
  if (staffBtn) staffBtn.disabled = true;
  btn.textContent = 'Verificando...';

  try {
    var res = await fetch('/api/auth/login', {
      method: 'POST',
      headers: { 'Content-Type': 'application/json' },
      body: JSON.stringify({
        email: document.getElementById('email').value.trim(),
        password: document.getElementById('password').value
      })
    });

    var data;
    var contentType = res.headers.get('content-type') || '';
    if (contentType.includes('application/json')) {
      data = await res.json();
    } else {
      var text = await res.text();
      data = { error: text || ('Error del servidor (HTTP ' + res.status + ')') };
    }

    if (!res.ok) {
      errEl.textContent = data.error || ('Error (HTTP ' + res.status + ')');
      btn.disabled = false;
      if (staffBtn) staffBtn.disabled = false;
      btn.textContent = 'Iniciar Sesion';
      return;
    }

    // Store auth state and login mode
    localStorage.setItem('AUTH_TOKEN', data.token);
    localStorage.setItem('AUTH_USER', JSON.stringify(data.user));
    localStorage.setItem('LOGIN_MODE', mode);

    window.location.href = '/';
  } catch (err) {
    errEl.textContent = 'Error de conexion: ' + (err.message || err);
    btn.disabled = false;
    if (staffBtn) staffBtn.disabled = false;
    btn.textContent = 'Iniciar Sesion';
  }
}
</script>
</body>
</html>
