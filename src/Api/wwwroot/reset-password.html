<!doctype html>
<html lang="en">
<head>
  <meta charset="utf-8" />
  <meta name="viewport" content="width=device-width,initial-scale=1" />
  <title>CODIGO — Reset Password</title>
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700;800&display=swap" rel="stylesheet">
  <style>
    :root {
      --font: 'Inter', -apple-system, BlinkMacSystemFont, 'SF Pro Display', 'Segoe UI', sans-serif;
      --radius: 16px; --radius-sm: 10px; --transition: .2s ease;
      --bg: #F5F5F7; --surface: #FFFFFF; --card: #FFFFFF;
      --text: #1D1D1F; --text-secondary: #6E6E73; --muted: #8E8E93;
      --border: #E8E8ED;
      --accent: #007AFF; --accent-hover: #0062CC;
      --accent-glow: rgba(0,122,255,.08);
      --danger: #FF3B30; --success: #34C759; --success-bg: rgba(52,199,89,.08);
      --input-bg: #F5F5F7; --logo-color: #1D1D1F;
    }
    [data-theme="dark"] {
      --bg: #000000; --surface: rgba(28,28,30,.78); --card: rgba(22,22,26,.74);
      --text: #FFFFFF; --text-secondary: rgba(255,255,255,.78); --muted: #98989D;
      --border: rgba(255,255,255,.10);
      --accent: #0A84FF; --accent-hover: #409CFF;
      --accent-glow: rgba(10,132,255,.18);
      --danger: #FF453A; --success: #30D158; --success-bg: rgba(48,209,88,.12);
      --input-bg: rgba(44,44,46,.65); --logo-color: #F5F5F7;
    }
    * { box-sizing: border-box; margin: 0; }
    html { -webkit-font-smoothing: antialiased; }
    body {
      font-family: var(--font); background: var(--bg); color: var(--text);
      margin: 0; padding: 0; min-height: 100vh;
      display: flex; align-items: center; justify-content: center;
      transition: background var(--transition), color var(--transition);
      position: relative; overflow: hidden;
    }
    body::before {
      content: ''; position: fixed; inset: 0; z-index: 0; pointer-events: none;
      background-image: linear-gradient(rgba(0,0,0,.06) 1px, transparent 1px), linear-gradient(90deg, rgba(0,0,0,.06) 1px, transparent 1px);
      background-size: 40px 40px;
      -webkit-mask-image: radial-gradient(ellipse 70% 60% at 50% 50%, black 30%, transparent 80%);
      mask-image: radial-gradient(ellipse 70% 60% at 50% 50%, black 30%, transparent 80%);
    }
    [data-theme="dark"] body::before {
      background-image: linear-gradient(rgba(255,255,255,.07) 1px, transparent 1px), linear-gradient(90deg, rgba(255,255,255,.07) 1px, transparent 1px);
    }
    body::after {
      content: ''; position: fixed; inset: 0; z-index: 0; pointer-events: none;
      background: radial-gradient(ellipse 80% 80% at 50% 50%, transparent 40%, var(--bg) 100%);
    }
    .container { width: 100%; max-width: 400px; padding: 20px; position: relative; z-index: 1; }
    .card {
      background: var(--card); border: 1px solid rgba(0,0,0,.08); border-radius: var(--radius);
      padding: 44px 38px 38px; position: relative;
      box-shadow: inset 0 0 0 1px rgba(255,255,255,.70), inset 0 0 0 2px rgba(0,0,0,.025), inset 0 2px 4px rgba(0,0,0,.04), 0 8px 32px rgba(0,0,0,.08);
    }
    [data-theme="dark"] .card {
      border: 1px solid rgba(255,255,255,.12);
      box-shadow: inset 0 0 0 1px rgba(255,255,255,.07), inset 0 2px 5px rgba(0,0,0,.22), 0 12px 40px rgba(0,0,0,.45);
      -webkit-backdrop-filter: blur(24px) saturate(140%); backdrop-filter: blur(24px) saturate(140%);
    }
    .brand { text-align: center; margin-bottom: 32px; }
    .brand-logo { font-size: 22px; font-weight: 800; letter-spacing: 4px; color: var(--logo-color); }
    .brand-sub { font-size: 10.5px; color: var(--muted); letter-spacing: 1px; text-transform: uppercase; margin-top: 8px; font-weight: 500; }
    .form-group { margin-bottom: 20px; }
    .form-group label {
      display: block; font-size: 11.5px; font-weight: 600; color: var(--text-secondary);
      margin-bottom: 7px; letter-spacing: .4px; text-transform: uppercase;
    }
    .form-group input {
      width: 100%; padding: 11px 14px; border: 1px solid rgba(0,0,0,.08); border-radius: var(--radius-sm);
      font-size: 14px; font-family: var(--font); background: var(--input-bg); color: var(--text);
      transition: border .25s ease, box-shadow .25s ease; outline: none;
      box-shadow: inset 0 0 0 1px rgba(0,0,0,.03), inset 0 2px 4px rgba(0,0,0,.05);
    }
    .form-group input:focus { border-color: var(--accent); box-shadow: 0 0 0 3.5px var(--accent-glow); }
    [data-theme="dark"] .form-group input {
      border: 1px solid rgba(255,255,255,.08);
      box-shadow: inset 0 0 0 1px rgba(0,0,0,.15), inset 0 2px 4px rgba(0,0,0,.22);
    }
    .field-hint { font-size: 11px; color: var(--muted); margin-top: 5px; }
    .field-hint.error { color: var(--danger); }
    .submit-btn {
      width: 100%; padding: 12px 20px; background: var(--accent); color: #fff; border: none;
      border-radius: var(--radius-sm); font-size: 14px; font-weight: 600; font-family: var(--font);
      cursor: pointer; transition: all .25s cubic-bezier(.4,0,.2,1);
      border: 1px solid rgba(0,80,200,.14);
      box-shadow: inset 0 0 0 1px rgba(255,255,255,.12), 0 2px 8px rgba(0,122,255,.18);
    }
    .submit-btn:hover { background: var(--accent-hover); transform: translateY(-1px); }
    .submit-btn:active { transform: translateY(0) scale(.98); }
    .submit-btn:disabled { opacity: .55; cursor: not-allowed; transform: none; }
    .login-btn {
      display: block; width: 100%; padding: 12px 20px; margin-top: 16px; text-align: center;
      background: var(--surface); color: var(--text); border: 1px solid var(--border);
      border-radius: var(--radius-sm); font-size: 14px; font-weight: 600; font-family: var(--font);
      cursor: pointer; text-decoration: none; transition: all .2s ease;
    }
    .login-btn:hover { background: var(--input-bg); }
    .msg { font-size: 13px; text-align: center; margin-top: 14px; min-height: 20px; line-height: 1.5; }
    .msg.error { color: var(--danger); }
    .back-link { text-align: center; margin-top: 24px; }
    .back-link a { color: var(--muted); font-size: 13px; text-decoration: none; }
    .back-link a:hover { color: var(--text-secondary); }
    .theme-toggle {
      position: fixed; top: 18px; right: 18px; background: var(--surface); border: 1px solid var(--border);
      color: var(--muted); width: 36px; height: 36px; border-radius: 50%;
      display: flex; align-items: center; justify-content: center; cursor: pointer; font-size: 15px;
      padding: 0; line-height: 1; z-index: 10;
    }
    .desc { font-size: 13px; color: var(--muted); text-align: center; margin-bottom: 24px; line-height: 1.6; }
    .invalid-state { text-align: center; padding: 16px 0; }
    .invalid-state p { font-size: 14px; color: var(--text-secondary); margin-bottom: 16px; line-height: 1.6; }
    .success-card { text-align: center; padding: 8px 0 4px; }
    .success-icon {
      width: 48px; height: 48px; border-radius: 50%; background: var(--success-bg);
      display: inline-flex; align-items: center; justify-content: center;
      font-size: 22px; margin-bottom: 16px;
    }
    .success-title { font-size: 17px; font-weight: 700; color: var(--text); margin-bottom: 8px; }
    .success-text { font-size: 13px; color: var(--muted); line-height: 1.6; }
  </style>
</head>
<body>
  <button class="theme-toggle" onclick="toggleTheme()" title="Toggle theme"><span id="themeIcon">&#9790;</span></button>
  <div class="container">
    <div class="card">
      <div class="brand">
        <div class="brand-logo">CODIGO</div>
        <div class="brand-sub">Set New Password</div>
      </div>

      <!-- Form -->
      <div id="formArea">
        <div class="desc">Choose a strong password for your account.</div>
        <form id="resetForm" onsubmit="handleSubmit(event)">
          <div class="form-group">
            <label for="password">New Password</label>
            <input type="password" id="password" placeholder="Enter new password" autocomplete="new-password" required minlength="6" oninput="validateLive()" />
            <div class="field-hint" id="pwHint">Minimum 6 characters</div>
          </div>
          <div class="form-group">
            <label for="confirm">Confirm Password</label>
            <input type="password" id="confirm" placeholder="Repeat new password" autocomplete="new-password" required minlength="6" oninput="validateLive()" />
            <div class="field-hint" id="matchHint"></div>
          </div>
          <button type="submit" class="submit-btn" id="submitBtn">Update Password</button>
          <div class="msg" id="msg"></div>
        </form>
      </div>

      <!-- Success state -->
      <div id="successArea" style="display:none;">
        <div class="success-card">
          <div class="success-icon">&#10003;</div>
          <div class="success-title">Password updated</div>
          <div class="success-text">Your password has been changed successfully. You can now sign in with your new password.</div>
          <a href="/login.html" class="login-btn">Go to Login</a>
        </div>
      </div>

      <!-- Invalid token state -->
      <div id="invalidArea" style="display:none;">
        <div class="invalid-state">
          <p>This reset link is invalid or has expired.</p>
          <a href="/forgot-password.html" class="login-btn" style="display:inline-block;width:auto;padding:10px 24px;">Request a new link</a>
        </div>
      </div>

      <div class="back-link"><a href="/login.html">&larr; Back to login</a></div>
    </div>
  </div>
<script>
(function(){
  var saved = localStorage.getItem('THEME');
  if (saved) applyTheme(saved);
  else applyTheme(window.matchMedia('(prefers-color-scheme: dark)').matches ? 'dark' : 'light');
})();
function applyTheme(t){ document.documentElement.setAttribute('data-theme', t); var i=document.getElementById('themeIcon'); if(i) i.textContent = t==='dark'?'\u2600':'\u263E'; }
function toggleTheme(){ var c=document.documentElement.getAttribute('data-theme')||'light'; var n=c==='dark'?'light':'dark'; localStorage.setItem('THEME',n); applyTheme(n); }

var params = new URLSearchParams(window.location.search);
var token = params.get('token');
if (!token) {
  document.getElementById('formArea').style.display = 'none';
  document.getElementById('invalidArea').style.display = '';
} else {
  // Validate token before showing form
  document.getElementById('submitBtn').disabled = true;
  document.getElementById('submitBtn').textContent = 'Validating link...';
  fetch('/api/auth/validate-reset-token?token=' + encodeURIComponent(token))
    .then(function(r){ return r.json(); })
    .then(function(d){
      if (!d.valid) {
        document.getElementById('formArea').style.display = 'none';
        document.getElementById('invalidArea').style.display = '';
      } else {
        document.getElementById('submitBtn').disabled = false;
        document.getElementById('submitBtn').textContent = 'Update Password';
      }
    })
    .catch(function(){
      document.getElementById('submitBtn').disabled = false;
      document.getElementById('submitBtn').textContent = 'Update Password';
    });
}

function validateLive() {
  var pw = document.getElementById('password').value;
  var cf = document.getElementById('confirm').value;
  var pwHint = document.getElementById('pwHint');
  var matchHint = document.getElementById('matchHint');

  if (pw.length > 0 && pw.length < 6) {
    pwHint.textContent = 'Too short — minimum 6 characters';
    pwHint.className = 'field-hint error';
  } else {
    pwHint.textContent = pw.length >= 6 ? 'Looks good' : 'Minimum 6 characters';
    pwHint.className = 'field-hint';
  }

  if (cf.length > 0) {
    if (pw === cf) { matchHint.textContent = 'Passwords match'; matchHint.className = 'field-hint'; }
    else { matchHint.textContent = 'Passwords do not match'; matchHint.className = 'field-hint error'; }
  } else {
    matchHint.textContent = '';
  }
}

async function handleSubmit(e) {
  e.preventDefault();
  var btn = document.getElementById('submitBtn');
  var msg = document.getElementById('msg');
  var pw = document.getElementById('password').value;
  var cf = document.getElementById('confirm').value;

  msg.textContent = ''; msg.className = 'msg';

  if (pw.length < 6) { msg.textContent = 'Password must be at least 6 characters.'; msg.className = 'msg error'; return; }
  if (pw !== cf) { msg.textContent = 'Passwords do not match.'; msg.className = 'msg error'; return; }

  btn.disabled = true;
  btn.textContent = 'Updating password...';

  try {
    var res = await fetch('/api/auth/reset-password', {
      method: 'POST',
      headers: { 'Content-Type': 'application/json' },
      body: JSON.stringify({ token: token, newPassword: pw })
    });
    var data = await res.json();
    if (res.ok) {
      document.getElementById('formArea').style.display = 'none';
      document.getElementById('successArea').style.display = '';
    } else {
      msg.textContent = data.error || 'Reset failed. The link may have expired.';
      msg.className = 'msg error';
      btn.disabled = false;
      btn.textContent = 'Update Password';
    }
  } catch (err) {
    msg.textContent = 'Connection error. Please try again.';
    msg.className = 'msg error';
    btn.disabled = false;
    btn.textContent = 'Update Password';
  }
}
</script>
</body>
</html>
