<!doctype html>
<html lang="en">
<head>
  <meta charset="utf-8" />
  <meta name="viewport" content="width=device-width,initial-scale=1" />
  <title>CODIGO — Forgot Password</title>
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700;800&display=swap" rel="stylesheet">
  <link href="https://fonts.googleapis.com/css2?family=Geist:wght@400;500;600;700&family=Geist+Mono:wght@400;500&family=Instrument+Serif:ital@0;1&display=swap" rel="stylesheet">
  <style>
    :root {
      --font: 'Inter', -apple-system, BlinkMacSystemFont, 'SF Pro Display', 'Segoe UI', sans-serif;
      --radius: 16px; --radius-sm: 10px; --transition: .2s ease;
      --bg: #F5F5F7; --surface: #FFFFFF; --card: #FFFFFF;
      --text: #1D1D1F; --text-secondary: #6E6E73; --muted: #8E8E93;
      --border: #E8E8ED;
      --accent: #007AFF; --accent-hover: #0062CC;
      --accent-glow: rgba(0,122,255,.08);
      --danger: #FF3B30; --success: #34C759; --success-bg: rgba(52,199,89,.08);
      --input-bg: #F5F5F7; --logo-color: #1D1D1F;
    }
    [data-theme="dark"] {
      --bg: #000000; --surface: rgba(28,28,30,.78); --card: rgba(22,22,26,.74);
      --text: #FFFFFF; --text-secondary: rgba(255,255,255,.78); --muted: #98989D;
      --border: rgba(255,255,255,.10);
      --accent: #0A84FF; --accent-hover: #409CFF;
      --accent-glow: rgba(10,132,255,.18);
      --danger: #FF453A; --success: #30D158; --success-bg: rgba(48,209,88,.12);
      --input-bg: rgba(44,44,46,.65); --logo-color: #F5F5F7;
    }
    * { box-sizing: border-box; margin: 0; }
    html { -webkit-font-smoothing: antialiased; }
    body {
      font-family: var(--font); background: var(--bg); color: var(--text);
      margin: 0; padding: 0; min-height: 100vh;
      display: flex; align-items: center; justify-content: center;
      transition: background var(--transition), color var(--transition);
      position: relative; overflow: hidden;
    }
    body::before {
      content: ''; position: fixed; inset: 0; z-index: 0; pointer-events: none;
      background-image: linear-gradient(rgba(0,0,0,.06) 1px, transparent 1px), linear-gradient(90deg, rgba(0,0,0,.06) 1px, transparent 1px);
      background-size: 40px 40px;
      -webkit-mask-image: radial-gradient(ellipse 70% 60% at 50% 50%, black 30%, transparent 80%);
      mask-image: radial-gradient(ellipse 70% 60% at 50% 50%, black 30%, transparent 80%);
    }
    [data-theme="dark"] body::before {
      background-image: linear-gradient(rgba(255,255,255,.07) 1px, transparent 1px), linear-gradient(90deg, rgba(255,255,255,.07) 1px, transparent 1px);
    }
    body::after {
      content: ''; position: fixed; inset: 0; z-index: 0; pointer-events: none;
      background: radial-gradient(ellipse 80% 80% at 50% 50%, transparent 40%, var(--bg) 100%);
    }
    .container { width: 100%; max-width: 400px; padding: 20px; position: relative; z-index: 1; }
    .card {
      background: var(--card); border: 1px solid rgba(0,0,0,.08); border-radius: var(--radius);
      padding: 44px 38px 38px; position: relative;
      box-shadow: inset 0 0 0 1px rgba(255,255,255,.70), inset 0 0 0 2px rgba(0,0,0,.025), inset 0 2px 4px rgba(0,0,0,.04), 0 8px 32px rgba(0,0,0,.08);
    }
    [data-theme="dark"] .card {
      border: 1px solid rgba(255,255,255,.12);
      box-shadow: inset 0 0 0 1px rgba(255,255,255,.07), inset 0 2px 5px rgba(0,0,0,.22), 0 12px 40px rgba(0,0,0,.45);
      -webkit-backdrop-filter: blur(24px) saturate(140%); backdrop-filter: blur(24px) saturate(140%);
    }
    .brand { text-align: center; margin-bottom: 32px; }
    .brand-logo { font-size: 22px; font-weight: 800; letter-spacing: 4px; color: var(--logo-color); }
    .brand-sub { font-size: 10.5px; color: var(--muted); letter-spacing: 1px; text-transform: uppercase; margin-top: 8px; font-weight: 500; }
    .form-group { margin-bottom: 20px; }
    .form-group label {
      display: block; font-size: 11.5px; font-weight: 600; color: var(--text-secondary);
      margin-bottom: 7px; letter-spacing: .4px; text-transform: uppercase;
    }
    .form-group input {
      width: 100%; padding: 11px 14px; border: 1px solid rgba(0,0,0,.08); border-radius: var(--radius-sm);
      font-size: 14px; font-family: var(--font); background: var(--input-bg); color: var(--text);
      transition: border .25s ease, box-shadow .25s ease; outline: none;
      box-shadow: inset 0 0 0 1px rgba(0,0,0,.03), inset 0 2px 4px rgba(0,0,0,.05);
    }
    .form-group input:focus { border-color: var(--accent); box-shadow: 0 0 0 3.5px var(--accent-glow); }
    [data-theme="dark"] .form-group input {
      border: 1px solid rgba(255,255,255,.08);
      box-shadow: inset 0 0 0 1px rgba(0,0,0,.15), inset 0 2px 4px rgba(0,0,0,.22);
    }
    .submit-btn {
      width: 100%; padding: 12px 20px; background: var(--accent); color: #fff; border: none;
      border-radius: var(--radius-sm); font-size: 14px; font-weight: 600; font-family: var(--font);
      cursor: pointer; transition: all .25s cubic-bezier(.4,0,.2,1);
      border: 1px solid rgba(0,80,200,.14);
      box-shadow: inset 0 0 0 1px rgba(255,255,255,.12), 0 2px 8px rgba(0,122,255,.18);
    }
    .submit-btn:hover { background: var(--accent-hover); transform: translateY(-1px); }
    .submit-btn:active { transform: translateY(0) scale(.98); }
    .submit-btn:disabled { opacity: .55; cursor: not-allowed; transform: none; }
    .msg { font-size: 13px; text-align: center; margin-top: 14px; min-height: 20px; }
    .msg.error { color: var(--danger); }
    .back-link { text-align: center; margin-top: 24px; }
    .back-link a { color: var(--muted); font-size: 13px; text-decoration: none; }
    .back-link a:hover { color: var(--text-secondary); }
    .theme-toggle {
      position: fixed; top: 18px; right: 18px; background: var(--surface); border: 1px solid var(--border);
      color: var(--muted); width: 36px; height: 36px; border-radius: 50%;
      display: flex; align-items: center; justify-content: center; cursor: pointer; font-size: 15px;
      padding: 0; line-height: 1; z-index: 10;
    }
    .desc { font-size: 13px; color: var(--muted); text-align: center; margin-bottom: 24px; line-height: 1.6; }
    .success-card {
      text-align: center; padding: 8px 0 4px;
    }
    .success-icon {
      width: 48px; height: 48px; border-radius: 50%; background: var(--success-bg);
      display: inline-flex; align-items: center; justify-content: center;
      font-size: 22px; margin-bottom: 16px;
    }
    .success-title { font-size: 17px; font-weight: 700; color: var(--text); margin-bottom: 8px; }
    .success-text { font-size: 13px; color: var(--muted); line-height: 1.6; margin-bottom: 4px; }
    .cooldown-text { font-size: 12px; color: var(--muted); margin-top: 10px; }

    /* ═══ MerchantOS Phase 1 — Visual Foundation (auth screen) ═══ */
    :root {
      --font-ui:       'Geist', 'Inter', -apple-system, BlinkMacSystemFont, 'SF Pro Display', 'Segoe UI', sans-serif;
      --font-mono:     'Geist Mono', ui-monospace, 'SF Mono', Menlo, Consolas, monospace;
      --font-editorial:'Instrument Serif', 'Times New Roman', serif;
      --font: var(--font-ui);
      --mos-radius-card: 16px;
      --mos-radius-ctrl: 10px;
      --mos-ring: 0 0 0 2px rgba(255,255,255,.04), 0 0 0 4px rgba(120,170,255,.28);
    }
    [data-theme="dark"] {
      --bg: #0A0A0B;
      --card: rgba(20,20,24,.70);
      --text: #F5F5F7;
      --text-secondary: rgba(245,245,247,.72);
      --muted: rgba(245,245,247,.46);
      --accent: #7AA8FF;
      --accent-hover: #A6C4FF;
      --accent-glow: rgba(122,168,255,.18);
      --input-bg: rgba(255,255,255,.03);
      --logo-color: #F5F5F7;
    }
    body { font-family: var(--font-ui); letter-spacing: -.005em; }
    [data-theme="dark"] body {
      background:
        radial-gradient(900px 520px at 20% 0%, rgba(122,168,255,.10), transparent 60%),
        radial-gradient(780px 480px at 90% 100%, rgba(180,140,255,.06), transparent 65%),
        #0A0A0B;
      background-attachment: fixed;
    }
    [data-theme="dark"] body::before { opacity: .35; }
    [data-theme="dark"] .card {
      background: rgba(20,20,24,.72);
      border: 1px solid rgba(255,255,255,.08);
      border-radius: var(--mos-radius-card);
      box-shadow:
        inset 0 1px 0 rgba(255,255,255,.04),
        0 20px 60px rgba(0,0,0,.55),
        0 4px 14px rgba(0,0,0,.30);
      -webkit-backdrop-filter: blur(28px) saturate(150%);
      backdrop-filter: blur(28px) saturate(150%);
    }
    [data-theme="dark"] .form-group input {
      background: rgba(255,255,255,.03);
      border: 1px solid rgba(255,255,255,.08);
      border-radius: var(--mos-radius-ctrl);
      box-shadow: inset 0 1px 0 rgba(0,0,0,.20);
    }
    [data-theme="dark"] .form-group input:focus {
      border-color: rgba(122,168,255,.45);
      box-shadow: var(--mos-ring), inset 0 1px 0 rgba(0,0,0,.20);
      background: rgba(255,255,255,.04);
    }
    [data-theme="dark"] .submit-btn {
      background: #F5F5F7;
      color: #0A0A0B;
      border: 1px solid rgba(255,255,255,.20);
      border-radius: var(--mos-radius-ctrl);
      box-shadow:
        inset 0 1px 0 rgba(255,255,255,.60),
        0 1px 2px rgba(0,0,0,.35);
    }
    [data-theme="dark"] .submit-btn:hover {
      background: #FFFFFF;
      border-color: rgba(255,255,255,.32);
      transform: none;
      box-shadow:
        inset 0 1px 0 rgba(255,255,255,.70),
        0 2px 6px rgba(0,0,0,.40);
    }
    [data-theme="dark"] .theme-toggle {
      background: rgba(255,255,255,.05);
      border: 1px solid rgba(255,255,255,.09);
    }
    [data-theme="dark"] .theme-toggle:hover { background: rgba(255,255,255,.08); }
    :root .card { border-radius: var(--mos-radius-card); }
    :root .form-group input, :root .submit-btn { border-radius: var(--mos-radius-ctrl); }
  </style>
</head>
<body>
  <button class="theme-toggle" onclick="toggleTheme()" title="Toggle theme"><span id="themeIcon">&#9790;</span></button>
  <div class="container">
    <div class="card">
      <div class="brand">
        <div class="brand-logo">CODIGO</div>
        <div class="brand-sub">Password Recovery</div>
      </div>

      <div id="formArea">
        <div class="desc">Enter the email address associated with your account and we'll send you a secure link to reset your password.</div>
        <form id="forgotForm" onsubmit="handleSubmit(event)">
          <div class="form-group">
            <label for="email">Email Address</label>
            <input type="email" id="email" placeholder="your@email.com" autocomplete="email" required />
          </div>
          <button type="submit" class="submit-btn" id="submitBtn">Send Reset Link</button>
          <div class="msg" id="msg"></div>
        </form>
      </div>

      <div id="successArea" style="display:none;">
        <div class="success-card">
          <div class="success-icon">&#9993;</div>
          <div class="success-title">Check your email</div>
          <div class="success-text">If an account exists for that email, we've sent a password reset link.</div>
          <div class="success-text">Don't see it? Check your spam or promotions folder.</div>
          <div class="cooldown-text" id="cooldownText"></div>
          <div style="margin-top:20px;">
            <button class="submit-btn" id="resendBtn" onclick="showForm()" disabled>Send again</button>
          </div>
        </div>
      </div>

      <div class="back-link"><a href="/login.html">&larr; Back to login</a></div>
    </div>
  </div>
<script>
(function(){
  var saved = localStorage.getItem('THEME');
  if (saved) applyTheme(saved);
  else applyTheme(window.matchMedia('(prefers-color-scheme: dark)').matches ? 'dark' : 'light');
})();
function applyTheme(t){ document.documentElement.setAttribute('data-theme', t); var i=document.getElementById('themeIcon'); if(i) i.textContent = t==='dark'?'\u2600':'\u263E'; }
function toggleTheme(){ var c=document.documentElement.getAttribute('data-theme')||'light'; var n=c==='dark'?'light':'dark'; localStorage.setItem('THEME',n); applyTheme(n); }

var _cooldown = 0;
var _cooldownTimer = null;

function startCooldown() {
  _cooldown = 25;
  var el = document.getElementById('cooldownText');
  var btn = document.getElementById('resendBtn');
  btn.disabled = true;
  function tick() {
    if (_cooldown <= 0) { el.textContent = ''; btn.disabled = false; btn.textContent = 'Send again'; return; }
    el.textContent = 'You can resend in ' + _cooldown + 's';
    btn.textContent = 'Send again (' + _cooldown + 's)';
    _cooldown--;
    _cooldownTimer = setTimeout(tick, 1000);
  }
  tick();
}

function showForm() {
  document.getElementById('successArea').style.display = 'none';
  document.getElementById('formArea').style.display = '';
  document.getElementById('email').value = '';
  document.getElementById('msg').textContent = '';
}

async function handleSubmit(e) {
  e.preventDefault();
  var btn = document.getElementById('submitBtn');
  var msg = document.getElementById('msg');
  var email = document.getElementById('email').value.trim();
  if (!email) return;

  btn.disabled = true;
  btn.textContent = 'Sending reset link...';
  msg.textContent = '';
  msg.className = 'msg';

  try {
    var res = await fetch('/api/auth/forgot-password', {
      method: 'POST',
      headers: { 'Content-Type': 'application/json' },
      body: JSON.stringify({ email: email })
    });
    await res.json();
    // Always show success (anti-enumeration)
    document.getElementById('formArea').style.display = 'none';
    document.getElementById('successArea').style.display = '';
    startCooldown();
  } catch (err) {
    msg.textContent = 'Connection error. Please try again.';
    msg.className = 'msg error';
    btn.disabled = false;
    btn.textContent = 'Send Reset Link';
  }
}
</script>
</body>
</html>
