<!doctype html>
<html lang="es">
<head>
  <meta charset="utf-8" />
  <meta name="viewport" content="width=device-width,initial-scale=1" />
  <title>WhatsAppSaaS - Menu Manager</title>
  <style>
    * { box-sizing: border-box; }
    body { font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Arial, sans-serif; margin: 0; padding: 16px; background: #f5f6fa; color: #333; }
    table { border-collapse: collapse; width: 100%; margin-top: 12px; background: #fff; border-radius: 8px; overflow: hidden; box-shadow: 0 1px 3px rgba(0,0,0,.08); }
    th, td { border-bottom: 1px solid #eee; padding: 8px 12px; vertical-align: top; text-align: left; }
    th { background: #f8f9fa; font-weight: 600; font-size: 13px; color: #555; }
    button { padding: 6px 10px; cursor: pointer; border: 1px solid #ddd; border-radius: 4px; background: #fff; font-size: 13px; }
    button:hover { background: #f0f0f0; }
    button.primary { background: #1a73e8; color: #fff; border-color: #1a73e8; }
    select, input, textarea { padding: 6px 8px; border: 1px solid #ddd; border-radius: 4px; font-size: 13px; }
    .muted { color:#888; }
    .small { font-size: 12px; }
    .row { display:flex; gap:10px; flex-wrap:wrap; align-items:center; margin-bottom: 8px; }
    .pill { display:inline-block; padding: 2px 8px; border-radius: 999px; background:#eee; margin: 2px; font-size: 12px; }
    .pill button { padding: 0 4px; border: none; background: none; color: #c62828; cursor: pointer; font-weight: bold; }
    .card { border:1px solid #e8e8e8; border-radius:10px; padding:16px; background:#fff; margin-bottom: 12px; box-shadow: 0 1px 3px rgba(0,0,0,.04); }
    .ok { color:#2e7d32; }
    .danger { color:#c62828; }
    h2 { margin: 0 0 8px 0; }
    a { color: #1a73e8; }
    .top { display:flex; justify-content:space-between; align-items:center; gap:12px; flex-wrap:wrap; margin-bottom: 16px; }
  </style>
</head>
<body>
  <div class="top">
    <div>
      <h2>Menu Manager</h2>
      <div class="muted small"><a href="/">← Volver al Dashboard</a></div>
    </div>
    <div class="row">
      <label class="muted small">Admin Key:</label>
      <input id="adminKey" style="width:200px;" placeholder="Admin Key" />
      <button onclick="saveKey()">Guardar</button>
      <span id="keyMsg" class="muted small"></span>
    </div>
  </div>

  <div class="row" style="margin-bottom:16px;">
    <label style="font-weight:600;">Negocio:</label>
    <select id="businessSelect" onchange="onBizSelect()" style="min-width:260px; font-weight:600; font-size:14px; padding:8px 10px; border:2px solid #1a73e8; border-radius:6px;">
      <option value="">(Seleccionar negocio)</option>
    </select>
    <button onclick="loadBusinesses()">&#x21bb;</button>
    <span id="bizStatus" class="small"></span>
    <span id="msg" class="muted small"></span>
  </div>

  <!-- Categories -->
  <div class="card">
    <h3 style="margin-top:0;">Categorias</h3>
    <div class="row">
      <input id="newCatName" placeholder="Nombre categoria" />
      <input id="newCatOrder" type="number" value="0" style="width:60px;" placeholder="Orden" />
      <button class="primary" onclick="createCategory()">+ Agregar</button>
    </div>
    <table>
      <thead><tr><th>Nombre</th><th>Orden</th><th>Activa</th><th>Items</th><th>Accion</th></tr></thead>
      <tbody id="catBody"></tbody>
    </table>
  </div>

  <!-- Items -->
  <div class="card">
    <h3 style="margin-top:0;">Items del Menu</h3>
    <div class="row">
      <select id="newItemCat"></select>
      <input id="newItemName" placeholder="Nombre" />
      <input id="newItemPrice" type="number" step="0.01" value="0" style="width:80px;" placeholder="Precio" />
      <input id="newItemDesc" placeholder="Descripcion (opcional)" />
      <input id="newItemAliases" placeholder="Aliases (coma)" style="width:180px;" />
      <button class="primary" onclick="createItem()">+ Agregar Item</button>
    </div>
    <table>
      <thead><tr><th>Categoria</th><th>Nombre</th><th>Precio</th><th>Descripcion</th><th>Disponible</th><th>Aliases</th><th>Accion</th></tr></thead>
      <tbody id="itemBody"></tbody>
    </table>
  </div>

<script>
function esc(s){ return (s??'').toString().replace(/[&<>"']/g, m=>({'&':'&amp;','<':'&lt;','>':'&gt;','"':'&quot;',"'":'&#039;'}[m])); }
function getKey(){ return localStorage.getItem('ADMIN_KEY') || ''; }
function saveKey(){
  const v = document.getElementById('adminKey').value.trim();
  if(!v){ localStorage.removeItem('ADMIN_KEY'); document.getElementById('keyMsg').innerHTML='<span class="danger">Borrada</span>'; return; }
  localStorage.setItem('ADMIN_KEY',v);
  document.getElementById('keyMsg').innerHTML='<span class="ok">OK</span>';
  loadBusinesses();
}
function hdrs(){ const k=getKey(); return k?{'X-Admin-Key':k,'Content-Type':'application/json'}:{'Content-Type':'application/json'}; }
function bid(){ return document.getElementById('businessSelect').value || ''; }

function onBizSelect(){
  const b = bid();
  if (b) { localStorage.setItem('BUSINESS_ID', b); loadAll(); }
}

async function loadBusinesses(){
  const key = getKey();
  const sel = document.getElementById('businessSelect');
  if (!key) return;
  try {
    const res = await fetch('/api/admin/businesses', { headers: {'X-Admin-Key': key} });
    if (!res.ok) return;
    const list = await res.json();
    const saved = localStorage.getItem('BUSINESS_ID') || '';
    sel.innerHTML = '<option value="">(Seleccionar negocio)</option>';
    for (const b of list) {
      const opt = document.createElement('option');
      opt.value = b.id;
      const status = b.isActive ? '' : ' [INACTIVO]';
      opt.textContent = b.name + ' (' + (b.phoneNumberId||'').slice(-6) + ')' + status;
      if (!b.isActive) opt.style.color = '#c62828';
      if (b.id === saved) opt.selected = true;
      sel.appendChild(opt);
    }
    // Show status of selected business
    const statusEl = document.getElementById('bizStatus');
    const selected = list.find(b => b.id === sel.value);
    if (selected && statusEl) {
      statusEl.innerHTML = selected.isActive
        ? '<span style="color:#2e7d32; font-weight:600;">Activo</span>'
        : '<span style="color:#c62828; font-weight:600;">Inactivo</span>';
    } else if (statusEl) {
      statusEl.innerHTML = '';
    }
    // Auto-load if a business is selected
    if (sel.value) loadAll();
  } catch(e) { console.error('loadBusinesses error:', e); }
}

async function loadAll(){
  const b = bid();
  if(!b){ document.getElementById('msg').textContent = 'Selecciona un negocio'; return; }
  document.getElementById('msg').textContent = 'Cargando...';
  await loadCategories();
  await loadItems();
  document.getElementById('msg').textContent = 'Listo';
}

async function loadCategories(){
  const res = await fetch(`/api/admin/menu/categories?businessId=${bid()}`, {headers: hdrs()});
  if(!res.ok){ document.getElementById('msg').textContent='Error cargando categorias'; return; }
  const cats = await res.json();
  const tbody = document.getElementById('catBody');
  tbody.innerHTML = '';
  const sel = document.getElementById('newItemCat');
  sel.innerHTML = '';

  for(const c of cats){
    const tr = document.createElement('tr');
    tr.innerHTML = `
      <td>${esc(c.name)}</td>
      <td>${c.sortOrder}</td>
      <td>${c.isActive ? '<span class="ok">Si</span>' : '<span class="danger">No</span>'}</td>
      <td>${c.itemCount}</td>
      <td>
        <button onclick="toggleCategory('${c.id}',${!c.isActive})">${c.isActive ? 'Desactivar' : 'Activar'}</button>
        <button onclick="deleteCategory('${c.id}')" style="color:#c62828;">Eliminar</button>
      </td>
    `;
    tbody.appendChild(tr);
    const opt = document.createElement('option');
    opt.value = c.id; opt.textContent = c.name;
    sel.appendChild(opt);
  }
}

async function loadItems(){
  const res = await fetch(`/api/admin/menu/items?businessId=${bid()}`, {headers: hdrs()});
  if(!res.ok) return;
  const items = await res.json();
  const tbody = document.getElementById('itemBody');
  tbody.innerHTML = '';
  for(const i of items){
    const aliasHtml = (i.aliases||[]).map(a =>
      `<span class="pill">${esc(a.alias)} <button onclick="deleteAlias('${a.id}')">&times;</button></span>`
    ).join(' ');
    const tr = document.createElement('tr');
    tr.innerHTML = `
      <td class="muted small">${esc(i.categoryName)}</td>
      <td><b>${esc(i.name)}</b></td>
      <td>${i.price.toFixed(2)}</td>
      <td class="muted small">${esc(i.description||'')}</td>
      <td><button onclick="toggleItem('${i.id}',${!i.isAvailable})">${i.isAvailable ? '<span class="ok">Si</span>' : '<span class="danger">No</span>'}</button></td>
      <td>
        ${aliasHtml}
        <input id="alias_${i.id}" placeholder="alias" style="width:80px;font-size:11px;" />
        <button onclick="addAlias('${i.id}')" style="font-size:11px;">+</button>
      </td>
      <td><button onclick="deleteItem('${i.id}')" style="color:#c62828;">Eliminar</button></td>
    `;
    tbody.appendChild(tr);
  }
}

async function createCategory(){
  const name = document.getElementById('newCatName').value.trim();
  const order = parseInt(document.getElementById('newCatOrder').value)||0;
  if(!name) return alert('Nombre requerido');
  if(!bid()) return alert('Selecciona un negocio');
  await fetch('/api/admin/menu/categories', { method:'POST', headers:hdrs(), body: JSON.stringify({businessId:bid(), name, sortOrder:order, isActive:true}) });
  document.getElementById('newCatName').value = '';
  await loadAll();
}

async function toggleCategory(id, isActive){
  await fetch(`/api/admin/menu/categories/${id}`, { method:'PUT', headers:hdrs(), body: JSON.stringify({name:'', sortOrder:0, isActive}) });
  await loadAll();
}

async function deleteCategory(id){
  if(!confirm('Eliminar categoria y todos sus items?')) return;
  await fetch(`/api/admin/menu/categories/${id}`, {method:'DELETE', headers:hdrs()});
  await loadAll();
}

async function createItem(){
  const catId = document.getElementById('newItemCat').value;
  const name = document.getElementById('newItemName').value.trim();
  const price = parseFloat(document.getElementById('newItemPrice').value)||0;
  const desc = document.getElementById('newItemDesc').value.trim()||null;
  const aliasStr = document.getElementById('newItemAliases').value.trim();
  const aliases = aliasStr ? aliasStr.split(',').map(a=>a.trim()).filter(Boolean) : [];
  if(!name) return alert('Nombre requerido');
  if(!catId) return alert('Selecciona una categoria');
  await fetch('/api/admin/menu/items', { method:'POST', headers:hdrs(), body: JSON.stringify({categoryId:catId, name, price, description:desc, isAvailable:true, sortOrder:0, aliases}) });
  document.getElementById('newItemName').value = '';
  document.getElementById('newItemPrice').value = '0';
  document.getElementById('newItemDesc').value = '';
  document.getElementById('newItemAliases').value = '';
  await loadAll();
}

async function toggleItem(id, isAvailable){
  await fetch(`/api/admin/menu/items/${id}/availability`, { method:'PATCH', headers:hdrs(), body: JSON.stringify({isAvailable}) });
  await loadAll();
}

async function deleteItem(id){
  if(!confirm('Eliminar item?')) return;
  await fetch(`/api/admin/menu/items/${id}`, {method:'DELETE', headers:hdrs()});
  await loadAll();
}

async function addAlias(itemId){
  const input = document.getElementById(`alias_${itemId}`);
  const alias = input.value.trim();
  if(!alias) return;
  await fetch(`/api/admin/menu/items/${itemId}/aliases`, { method:'POST', headers:hdrs(), body: JSON.stringify({alias}) });
  input.value = '';
  await loadAll();
}

async function deleteAlias(id){
  await fetch(`/api/admin/menu/aliases/${id}`, {method:'DELETE', headers:hdrs()});
  await loadAll();
}

// Init
document.getElementById('adminKey').value = getKey();
loadBusinesses();
</script>
</body>
</html>
